name: Pyomo Tests

on:
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened, ready_for_review, converted_to_draft ]
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pyomo-scope:
    name: Pyomo scope
    runs-on: ubuntu-latest
    outputs:
      run_pyomo: ${{ steps.scope.outputs.run_pyomo }}
      reason: ${{ steps.scope.outputs.reason }}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Decide whether Pyomo validation is required
      id: scope
      env:
        EVENT_NAME: ${{ github.event_name }}
        PR_DRAFT: ${{ github.event.pull_request.draft || false }}
        BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before || '' }}
        HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      run: |
        run_pyomo=false
        reason="not a Pyomo-sensitive change"

        if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
          run_pyomo=true
          reason="manual dispatch"
        elif [ "$EVENT_NAME" = "pull_request" ] && [ "$PR_DRAFT" = "true" ]; then
          reason="draft PR"
        elif [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
          run_pyomo=true
          reason="$EVENT_NAME trigger without comparable base"
        else
          changed_paths="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"
          while IFS= read -r path; do
            case "$path" in
              lyopronto/pyomo_models/**|\
              examples/example_pyomo_optimization.py|\
              tests/test_pyomo_models/**|\
              tests/test_pyomo_solver.py|\
              tests/pyomo_solver.py|\
              pyproject.toml|\
              .github/workflows/pyomo-tests.yml)
                run_pyomo=true
                reason="changed Pyomo-sensitive path: $path"
                break
                ;;
            esac
          done <<< "$changed_paths"
        fi

        echo "run_pyomo=$run_pyomo" >> "$GITHUB_OUTPUT"
        echo "reason=$reason" >> "$GITHUB_OUTPUT"
        echo "Pyomo validation required: $run_pyomo ($reason)"

  pyomo-no-solver:
    name: Pyomo import and construction lane
    needs: pyomo-scope
    runs-on: ubuntu-latest

    steps:
    - name: Report skipped Pyomo validation
      if: ${{ needs.pyomo-scope.outputs.run_pyomo != 'true' }}
      run: |
        echo "Pyomo validation skipped: ${{ needs.pyomo-scope.outputs.reason }}"

    - uses: actions/checkout@v4
      if: ${{ needs.pyomo-scope.outputs.run_pyomo == 'true' }}

    - name: Read CI version config
      if: ${{ needs.pyomo-scope.outputs.run_pyomo == 'true' }}
      id: versions
      uses: mikefarah/yq@v4.44.1
      with:
        cmd: yq eval '.python-version' .github/ci-config/ci-versions.yml

    - name: Set up Python
      if: ${{ needs.pyomo-scope.outputs.run_pyomo == 'true' }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ steps.versions.outputs.result }}
        cache: 'pip'
        cache-dependency-path: pyproject.toml

    - name: Install Pyomo test dependencies
      if: ${{ needs.pyomo-scope.outputs.run_pyomo == 'true' }}
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -e ".[dev,pyomo]"

    - name: Run Pyomo no-solver tests
      if: ${{ needs.pyomo-scope.outputs.run_pyomo == 'true' }}
      run: |
        echo "Running Pyomo import, model-construction, and solver-skip tests"
        pytest tests/test_pyomo_models tests/test_pyomo_solver.py -n auto -v

  pyomo-solver-comparison:
    name: Pyomo solver comparison lane (optional)
    if: ${{ needs.pyomo-scope.outputs.run_pyomo == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.draft == false) }}
    needs: [pyomo-scope, pyomo-no-solver]
    continue-on-error: true
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Read CI version config
      id: versions
      uses: mikefarah/yq@v4.44.1
      with:
        cmd: yq eval '.python-version' .github/ci-config/ci-versions.yml

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ steps.versions.outputs.result }}
        cache: 'pip'
        cache-dependency-path: pyproject.toml

    - name: Install Pyomo test dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -e ".[dev,pyomo]"

    - name: Install optional Pyomo solver extensions
      run: |
        idaes get-extensions --extra petsc || {
          rc=$?
          echo "Failed to install IDAES solver extensions for the Pyomo lane."
          echo "Install IPOPT with: idaes get-extensions --extra petsc"
          echo "Alternative local install: conda install -c conda-forge ipopt"
          exit "$rc"
        }

    - name: Run Pyomo SciPy comparison tests
      run: |
        pytest -n 0 -v \
          tests/test_pyomo_models/test_single_step.py::test_single_step_solves_and_matches_scipy_reference \
          tests/test_pyomo_models/test_single_step.py::test_single_step_cold_start_solves_and_matches_scipy_reference \
          tests/test_pyomo_models/test_trajectory.py::test_trajectory_solves_and_matches_scipy_reference \
          tests/test_pyomo_models/test_trajectory.py::test_trajectory_cold_start_solves_and_matches_scipy_reference
