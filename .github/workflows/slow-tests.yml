name: Manual Validation Lanes

on:
  workflow_dispatch:
    inputs:
      lane:
        description: 'Validation lane to run'
        required: true
        default: 'slow-non-pyomo'
        type: choice
        options:
          - slow-non-pyomo
          - full-non-pyomo
          - pyomo

permissions:
  contents: read

jobs:
  validation:
    name: ${{ inputs.lane }}
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Read CI version config
      id: versions
      uses: mikefarah/yq@v4.44.1
      with:
        cmd: yq eval '.python-version' .github/ci-config/ci-versions.yml

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ steps.versions.outputs.result }}
        cache: 'pip'
        cache-dependency-path: pyproject.toml

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        if [ "${{ inputs.lane }}" = "pyomo" ]; then
          pip install -e ".[dev,pyomo]"
        else
          pip install -e ".[dev]"
        fi

    - name: Install optional Pyomo solver extensions
      if: inputs.lane == 'pyomo'
      run: |
        idaes get-extensions --extra petsc || {
          rc=$?
          echo "Failed to install IDAES solver extensions for the Pyomo lane."
          echo "Install IPOPT with: idaes get-extensions --extra petsc"
          echo "Alternative local install: conda install -c conda-forge ipopt"
          exit "$rc"
        }

    - name: Run selected validation lane
      run: |
        run_pytest_allow_empty() {
          "$@" || {
            rc=$?
            if [ "$rc" -eq 5 ]; then
              echo "No tests collected for selected lane; treating this as a no-op."
              return 0
            fi
            return $rc
          }
        }

        case "${{ inputs.lane }}" in
          slow-non-pyomo)
            pytest tests/ -n auto -v -m "slow and not pyomo" --cov=lyopronto --cov-config=.coveragerc.non-pyomo --cov-report=term-missing
            ;;
          full-non-pyomo)
            pytest tests/ -n auto -v -m "not pyomo" --cov=lyopronto --cov-config=.coveragerc.non-pyomo --cov-report=term-missing
            ;;
          pyomo)
            run_pytest_allow_empty pytest tests/ -n auto -v -m "pyomo" --cov=lyopronto --cov-report=term-missing
            ;;
          *)
            echo "Unknown lane: ${{ inputs.lane }}"
            exit 2
            ;;
        esac
