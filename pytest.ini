[pytest]
# Pytest configuration for LyoPRONTO

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -n auto
    --maxfail=5
    --dist loadgroup

# Markers for organizing tests
markers =
    unit: Unit tests for individual functions
    integration: Integration tests for calculators
    regression: Regression tests against known results
    slow: Tests that take a long time to run
    parametric: Parametric tests across multiple scenarios
    fast: Quick tests that run in under 1 second
    main: Tests that cover functionality previously included in main.py
    serial: Tests intended to be run serially; enforce with 'pytest -m serial -n 0'
    pyomo: Tests requiring Pyomo and IPOPT solver (deselect with '-m not pyomo')
    notebook: Tests that execute Jupyter notebooks for documentation

filterwarnings =
    ignore:divide by zero encountered in scalar divide:RuntimeWarning:lyopronto\.functions
    ignore:No sublimation\.:UserWarning:lyopronto\.calc_unknownRp
    ignore:Total shelf temperature setpoint time exceeded; not all temperature data used\.:UserWarning:lyopronto\.calc_unknownRp
    ignore:Chamber pressure setpoint exceeds vapor pressure at shelf temperature.*:UserWarning:lyopronto\.calc_knownRp
    ignore:At Tshelf=.*sublimation is not feasible.*:UserWarning:lyopronto\.design_space
    ignore:At t=.*shelf temperature Tsh=.*is too low for sublimation\.:UserWarning:lyopronto\.design_space
    ignore:At Pch=.*drying completed in single timestep.*:UserWarning:lyopronto\.design_space
    ignore:Optimization failed at .*:UserWarning:lyopronto\.opt_Pch
    ignore:Total time exceeded\. Drying incomplete:UserWarning:lyopronto\.opt_Pch

# Minimum Python version
minversion = 3.8

# Coverage options (when using pytest-cov)
# Run with: pytest --cov=lyopronto --cov-report=html
